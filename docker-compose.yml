version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bomberdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresq/data
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
volumes:
  postgres-data:
